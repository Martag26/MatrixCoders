<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="cyl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
    <linearGradient id="cyl2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Grid -->
  <g stroke="#0ea5e9" stroke-width="0.4" opacity="0.15">
    <line x1="0" y1="100" x2="800" y2="100"/><line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/><line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="160" y1="0" x2="160" y2="500"/><line x1="320" y1="0" x2="320" y2="500"/>
    <line x1="480" y1="0" x2="480" y2="500"/><line x1="640" y1="0" x2="640" y2="500"/>
  </g>
  <!-- Database cylinder 1 (big, center-left) -->
  <ellipse cx="260" cy="155" rx="90" ry="22" fill="url(#cyl)"/>
  <rect x="170" y="155" width="180" height="130" fill="url(#cyl)"/>
  <ellipse cx="260" cy="285" rx="90" ry="22" fill="#0369a1"/>
  <ellipse cx="260" cy="155" rx="90" ry="22" fill="#38bdf8"/>
  <!-- Horizontal lines on cylinder -->
  <line x1="170" y1="195" x2="350" y2="195" stroke="#7dd3fc" stroke-width="1.5" opacity="0.6"/>
  <line x1="170" y1="230" x2="350" y2="230" stroke="#7dd3fc" stroke-width="1.5" opacity="0.6"/>
  <line x1="170" y1="265" x2="350" y2="265" stroke="#7dd3fc" stroke-width="1.5" opacity="0.6"/>
  <!-- Database cylinder 2 (smaller, right) -->
  <ellipse cx="500" cy="200" rx="65" ry="16" fill="url(#cyl2)"/>
  <rect x="435" y="200" width="130" height="95" fill="url(#cyl2)"/>
  <ellipse cx="500" cy="295" rx="65" ry="16" fill="#0369a1"/>
  <ellipse cx="500" cy="200" rx="65" ry="16" fill="#7dd3fc"/>
  <line x1="435" y1="225" x2="565" y2="225" stroke="#bae6fd" stroke-width="1.5" opacity="0.5"/>
  <line x1="435" y1="255" x2="565" y2="255" stroke="#bae6fd" stroke-width="1.5" opacity="0.5"/>
  <!-- Connection arrow -->
  <path d="M350 220 Q390 220 435 235" stroke="#38bdf8" stroke-width="2.5" fill="none" stroke-dasharray="6,3"/>
  <!-- SQL keyword badge -->
  <rect x="570" y="120" width="170" height="55" rx="12" fill="#0c4a6e" stroke="#0ea5e9" stroke-width="2"/>
  <text x="655" y="154" font-family="monospace" font-size="26" font-weight="900" fill="#38bdf8" text-anchor="middle">SELECT *</text>
  <!-- Small table grid -->
  <rect x="570" y="310" width="190" height="110" rx="8" fill="#0c4a6e" stroke="#0ea5e9" stroke-width="1.5"/>
  <line x1="570" y1="335" x2="760" y2="335" stroke="#0ea5e9" stroke-width="1" opacity="0.7"/>
  <line x1="570" y1="360" x2="760" y2="360" stroke="#0ea5e9" stroke-width="1" opacity="0.5"/>
  <line x1="570" y1="385" x2="760" y2="385" stroke="#0ea5e9" stroke-width="1" opacity="0.5"/>
  <line x1="660" y1="310" x2="660" y2="420" stroke="#0ea5e9" stroke-width="1" opacity="0.5"/>
  <text x="615" y="328" font-family="monospace" font-size="11" fill="#7dd3fc" text-anchor="middle">id</text>
  <text x="710" y="328" font-family="monospace" font-size="11" fill="#7dd3fc" text-anchor="middle">nombre</text>
  <text x="615" y="352" font-family="monospace" font-size="11" fill="#e0f2fe" text-anchor="middle">1</text>
  <text x="710" y="352" font-family="monospace" font-size="11" fill="#e0f2fe" text-anchor="middle">Ana</text>
  <text x="615" y="377" font-family="monospace" font-size="11" fill="#e0f2fe" text-anchor="middle">2</text>
  <text x="710" y="377" font-family="monospace" font-size="11" fill="#e0f2fe" text-anchor="middle">Luis</text>
  <!-- Label -->
  <rect x="100" y="340" width="260" height="50" rx="10" fill="#0c4a6e" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="230" y="372" font-family="'Arial',sans-serif" font-size="20" font-weight="700" fill="#7dd3fc" text-anchor="middle">Bases de Datos</text>
</svg>
