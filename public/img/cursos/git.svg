<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c1917"/>
      <stop offset="100%" stop-color="#0c0a09"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Subtle grid -->
  <g stroke="#f97316" stroke-width="0.4" opacity="0.12">
    <line x1="0" y1="125" x2="800" y2="125"/><line x1="0" y1="250" x2="800" y2="250"/>
    <line x1="0" y1="375" x2="800" y2="375"/>
    <line x1="200" y1="0" x2="200" y2="500"/><line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
  </g>
  <!-- Git branch diagram -->
  <!-- Main branch line -->
  <line x1="100" y1="340" x2="680" y2="340" stroke="#f97316" stroke-width="4"/>
  <!-- Feature branch -->
  <path d="M220 340 Q220 220 340 220 Q460 220 460 340" stroke="#fb923c" stroke-width="3" fill="none" stroke-dasharray="8,4"/>
  <!-- Commits on main -->
  <circle cx="160" cy="340" r="14" fill="url(#orange)" stroke="#fed7aa" stroke-width="2"/>
  <circle cx="340" cy="340" r="14" fill="url(#orange)" stroke="#fed7aa" stroke-width="2"/>
  <circle cx="460" cy="340" r="14" fill="#f97316" stroke="#fed7aa" stroke-width="2"/>
  <circle cx="580" cy="340" r="18" fill="url(#orange)" stroke="#fff" stroke-width="3"/>
  <!-- Commits on feature branch -->
  <circle cx="280" cy="220" r="12" fill="#7c3aed" stroke="#c4b5fd" stroke-width="2"/>
  <circle cx="400" cy="220" r="12" fill="#7c3aed" stroke="#c4b5fd" stroke-width="2"/>
  <!-- Commit labels -->
  <text x="160" y="390" font-family="monospace" font-size="12" fill="#fdba74" text-anchor="middle">init</text>
  <text x="280" y="200" font-family="monospace" font-size="12" fill="#c4b5fd" text-anchor="middle">feat</text>
  <text x="400" y="200" font-family="monospace" font-size="12" fill="#c4b5fd" text-anchor="middle">fix</text>
  <text x="460" y="390" font-family="monospace" font-size="12" fill="#fdba74" text-anchor="middle">merge</text>
  <text x="580" y="390" font-family="monospace" font-size="12" fill="#fff" text-anchor="middle">HEAD</text>
  <!-- Git logo diamond -->
  <rect x="530" y="95" width="100" height="100" rx="16" fill="url(#orange)" transform="rotate(45 580 145)"/>
  <text x="582" y="158" font-family="monospace" font-size="40" font-weight="900" fill="#fff" text-anchor="middle">git</text>
  <!-- Label -->
  <rect x="270" y="415" width="260" height="48" rx="10" fill="#1c1917" stroke="#f97316" stroke-width="1.5"/>
  <text x="400" y="446" font-family="'Arial',sans-serif" font-size="22" font-weight="700" fill="#fb923c" text-anchor="middle">Git y GitHub</text>
</svg>
