<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14532d"/>
      <stop offset="100%" stop-color="#052e16"/>
    </linearGradient>
    <linearGradient id="hex" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Grid lines -->
  <g stroke="#16a34a" stroke-width="0.5" opacity="0.2">
    <line x1="0" y1="100" x2="800" y2="100"/><line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/><line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="160" y1="0" x2="160" y2="500"/><line x1="320" y1="0" x2="320" y2="500"/>
    <line x1="480" y1="0" x2="480" y2="500"/><line x1="640" y1="0" x2="640" y2="500"/>
  </g>
  <!-- Server rack left -->
  <rect x="60" y="130" width="220" height="240" rx="12" fill="#0f172a" stroke="#22c55e" stroke-width="2"/>
  <rect x="75" y="150" width="190" height="30" rx="5" fill="#1e293b"/>
  <rect x="75" y="190" width="190" height="30" rx="5" fill="#1e293b"/>
  <rect x="75" y="230" width="190" height="30" rx="5" fill="#1e293b"/>
  <rect x="75" y="270" width="190" height="30" rx="5" fill="#1e293b"/>
  <rect x="75" y="310" width="190" height="30" rx="5" fill="#1e293b"/>
  <!-- LED dots -->
  <circle cx="245" cy="165" r="5" fill="#22c55e"/><circle cx="245" cy="205" r="5" fill="#22c55e"/>
  <circle cx="245" cy="245" r="5" fill="#f59e0b"/><circle cx="245" cy="285" r="5" fill="#22c55e"/>
  <circle cx="245" cy="325" r="5" fill="#22c55e"/>
  <!-- Cables -->
  <path d="M280 200 Q340 200 340 250 Q340 300 400 300" stroke="#22c55e" stroke-width="3" fill="none" opacity="0.7"/>
  <path d="M280 260 Q350 260 350 300 Q350 340 400 340" stroke="#86efac" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M280 230 Q360 230 360 270 Q360 320 400 320" stroke="#4ade80" stroke-width="2" fill="none" opacity="0.6"/>
  <!-- Node.js hexagon -->
  <polygon points="560,130 630,170 630,250 560,290 490,250 490,170" fill="url(#hex)" stroke="#4ade80" stroke-width="2"/>
  <text x="560" y="225" font-family="monospace" font-size="52" font-weight="900" fill="#fff" text-anchor="middle">N</text>
  <!-- Label -->
  <rect x="430" y="320" width="260" height="50" rx="10" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="560" y="352" font-family="'Arial',sans-serif" font-size="22" font-weight="700" fill="#86efac" text-anchor="middle">Node.js</text>
  <!-- Floating dots -->
  <circle cx="120" cy="90" r="4" fill="#22c55e" opacity="0.6"/>
  <circle cx="680" cy="80" r="6" fill="#4ade80" opacity="0.4"/>
  <circle cx="730" cy="420" r="5" fill="#22c55e" opacity="0.5"/>
</svg>
