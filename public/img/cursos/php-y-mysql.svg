      <g font-family='monospace' font-size='14' transform='translate(28,58)'>
        <text fill='#cbd5e1'>&lt;?<tspan fill='#60a5fa'>php</tspan></text>
        <text y='24' fill='#c084fc'>$pdo <tspan fill='#cbd5e1'>= new</tspan> <tspan fill='#fde047'>PDO</tspan><tspan fill='#cbd5e1'>(</tspan><tspan fill='#fb923c'>'mysql:host=…'</tspan><tspan fill='#cbd5e1'>);</tspan></text>
        <text y='48' fill='#c084fc'>$stmt <tspan fill='#cbd5e1'>= </tspan>$pdo<tspan fill='#cbd5e1'>-&gt;</tspan><tspan fill='#fde047'>prepare</tspan><tspan fill='#cbd5e1'>(</tspan></text>
        <text y='72' fill='#fb923c'>  'SELECT * FROM curso'</text>
        <text y='96' fill='#cbd5e1'>);</text>
        <text y='120' fill='#c084fc'>$stmt<tspan fill='#cbd5e1'>-&gt;</tspan><tspan fill='#fde047'>execute</tspan><tspan fill='#cbd5e1'>();</tspan></text>
        <text y='144' fill='#c084fc'>$rows <tspan fill='#cbd5e1'>= </tspan>$stmt<tspan fill='#cbd5e1'>-&gt;</tspan><tspan fill='#fde047'>fetchAll</tspan><tspan fill='#cbd5e1'>();</tspan></text>
      </g>
    </g>
